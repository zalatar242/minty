name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - name: Install dependencies (incl. optionals needed by tests)
        run: npm ci --include=optional
      - name: Run unit + integration tests
        run: npm test
      - name: Build + exercise seed data generator
        run: |
          node scripts/seed-dev-data.js --clean
          test -f data/unified/contacts.json
          test -f data/unified/interactions.json
      - name: Smoke-test export
        run: |
          node scripts/export-data.js /tmp/test.bundle.gz
          test -s /tmp/test.bundle.gz

  lint:
    name: Sanity checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm ci --include=optional
      - name: Syntax-check every JS file in crm/ and sources/
        run: |
          set -e
          for f in $(find crm sources scripts -name '*.js' -not -path '*/node_modules/*'); do
            node --check "$f"
          done
      - name: No accidental 'console.error' bound to process.exit leaks
        run: |
          ! grep -RIn --include='*.js' 'process\.exit(' crm/ || true

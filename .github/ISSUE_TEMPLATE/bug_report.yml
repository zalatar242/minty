name: Bug report
description: Something isn't working the way it should
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more specific you can be, the faster this gets fixed.

        For security issues, please use [GitHub's private vulnerability reporting](https://github.com/zalatar242/minty/security/advisories/new) instead — see [SECURITY.md](https://github.com/zalatar242/minty/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the bug. Be specific.
      placeholder: When I imported my LinkedIn ZIP, the merge step crashed with…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps. The smaller the repro, the faster the fix.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Minty version / commit SHA
      description: Output of `git rev-parse --short HEAD` or the release tag you're on.
      placeholder: "v0.3.2 or 7a1203b"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other (specify in additional context)
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Which source were you using?
      description: Skip if not source-related.
      multiple: true
      options:
        - WhatsApp
        - LinkedIn (ZIP)
        - LinkedIn (auto-sync)
        - Telegram
        - Email / Gmail
        - Google Contacts
        - SMS
        - Apollo
        - Not source-related
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant output. **Redact personal data first** — names, phone numbers, emails.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else worth knowing.
    validations:
      required: false
